name: Sync practice data

on:
  workflow_dispatch:
  repository_dispatch:
    types: [practice-data-updated]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRACTICE_DATA_REPO }}
          path: practice-data
          token: ${{ secrets.DATA_REPO_PAT }}

      - name: Build KV bulk file
        run: |
          python3 scripts/build_practice_kv.py \
            --input practice-data/questions.json \
            --output kv-bulk.json

      - name: Configure KV namespace
        working-directory: worker
        env:
          KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
        run: |
          if [ -z "$KV_NAMESPACE_ID" ]; then
            echo "Missing secret CLOUDFLARE_KV_NAMESPACE_ID"
            exit 1
          fi
          sed -i "s/KV_NAMESPACE_ID_PLACEHOLDER/${KV_NAMESPACE_ID}/" wrangler.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Upload questions to Cloudflare KV
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: kv bulk put ../kv-bulk.json --namespace-id=${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
