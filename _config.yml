# 鱼栋一个人主页 — Jekyll 配置

locale: "zh-CN"
modern_theme: true
title: "鱼栋一"
title_separator: "-"
name: "鱼栋一"
description: "华东师范大学数学与应用数学专业在读。课程笔记与个人主页。"
url: https://Y-D-1.github.io/
baseurl: ""
repository: "Y-D-1/Y-D-1.github.io"

author:
  avatar: "image.jpg"
  name: "鱼栋一"
  bio: "无聊的主页罢了"
  location: "Shanghai, China"
  employer: "ECNU"
  email: "jp20103117@163.com"
  github: "Y-D-1"

future: true
breadcrumbs: false

include:
  - _pages
  - files

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - vendor

encoding: "utf-8"
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  hard_wrap: false
  enable_coderay: false

collections:
  notes:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: modern-page
  - scope:
      path: ""
      type: notes
    values:
      layout: modern-page

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

timezone: Asia/Shanghai

compress_html:
  clippings: all
  ignore:
    envs: development
