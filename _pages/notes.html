课程笔记仅供交流学习使用，请勿用于商业用途.

<!-- 搜索框 -->
<div class="notes-search">
  <label class="sr-only" for="courseSearch">搜索课程</label>
  <input type="text" id="courseSearch" placeholder="搜索课程中文名，例如：数学分析、泛函分析" class="search-input">
  <button id="clearSearch" type="button" class="clear-search-btn">清除</button>
  <p id="searchResults" class="search-results" aria-live="polite">支持按课程中文名搜索。</p>
</div>

{% include base_path %}

<div class="exams-list" id="notesList">
  {% assign sorted_exams = site.notes | sort: "date" | reverse %}
  {% for post in sorted_exams %}
    {% include archive-single.html %}
  {% endfor %}
</div>

<style>
.exam-course-item {
  position: relative;
  border: 1px solid rgba(0, 0, 0, 0.1);
  border-radius: 14px;
  padding: 1.2rem 1.3rem;
  margin-bottom: 1.1rem;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.75), rgba(255, 255, 255, 0.35));
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.07);
  transition: all 0.3s ease;
  overflow: hidden;
}

.exam-course-item::before {
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 3px;
  background: linear-gradient(90deg, #2f7de1, #4bb6a5);
  opacity: 0.75;
}

.exam-course-item:hover {
  border-color: rgba(47, 125, 225, 0.35);
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
  transform: translateY(-3px);
}

.exam-course-header {
  margin-bottom: 0.5rem;
}

.archive__item-title {
  margin-bottom: 0.6rem;
}

.archive__item-title a {
  color: inherit;
  text-decoration: none;
  font-size: 1.28rem;
  font-weight: 700;
}

.archive__item-title a:hover {
  color: #2f7de1;
}

.course-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem;
  font-size: 0.9rem;
  color: inherit;
}

.course-meta span {
  background: rgba(255, 255, 255, 0.04);
  padding: 0.26rem 0.72rem;
  border-radius: 999px;
  border: 1px solid rgba(128, 128, 128, 0.32);
  backdrop-filter: blur(3px);
}

.course-type {
  background: rgba(255, 255, 255, 0.04) !important;
  border-color: rgba(47, 125, 225, 0.35) !important;
  color: inherit;
}

.course-venue {
  background: rgba(255, 255, 255, 0.04) !important;
  border-color: rgba(75, 182, 165, 0.45) !important;
  color: inherit;
}

.course-notice {
  margin-top: 0.8rem;
  padding-top: 0.7rem;
  border-top: 1px dashed rgba(128, 128, 128, 0.3);
  color: rgba(90, 90, 90, 0.9);
  font-size: 0.84rem;
  text-align: center;
}

/* 搜索相关样式 */
.notes-search {
  margin: 1.6rem 0 1.1rem;
  text-align: center;
}

.search-input {
  width: 100%;
  max-width: 560px;
  padding: 0.75rem 1rem;
  border: 1px solid rgba(128, 128, 128, 0.35);
  border-radius: 25px;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
  background: rgba(255, 255, 255, 0.5);
  color: inherit;
}

.search-input:focus {
  border-color: rgba(47, 125, 225, 0.7);
  box-shadow: 0 0 0 3px rgba(47, 125, 225, 0.15);
}

.search-input::placeholder {
  color: rgba(110, 110, 110, 0.9);
}

.clear-search-btn {
  display: none;
  margin: 0.9rem 0 0;
  padding: 0.4rem 0.95rem;
  border: 1px solid rgba(128, 128, 128, 0.45);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.6);
  color: inherit;
  cursor: pointer;
  transition: all 0.2s ease;
}

.clear-search-btn:hover {
  border-color: rgba(47, 125, 225, 0.45);
  background: rgba(47, 125, 225, 0.08);
}

.exams-list {
  margin-top: 1.2rem;
}

.search-results {
  text-align: center;
  margin: 0.6rem auto 0;
  min-height: 1.3rem;
  font-size: 0.92rem;
  max-width: 560px;
  color: inherit;
}

.search-results.no-results {
  color: #b73a3a;
}

mark.search-mark {
  background: rgba(255, 210, 72, 0.65);
  color: inherit;
  border-radius: 0.2em;
  padding: 0 0.08em;
}

/* 响应式设计 */
@media (max-width: 768px) {
  .exam-course-item {
    padding: 1rem 0.95rem;
  }
  
  .archive__item-title a {
    font-size: 1.12rem;
  }
  
  .course-meta {
    gap: 0.45rem;
  }
  
  .course-meta span {
    font-size: 0.78rem;
    padding: 0.2rem 0.5rem;
  }

  .search-results {
    font-size: 0.88rem;
  }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
  var searchInput = document.getElementById("courseSearch");
  var clearBtn = document.getElementById("clearSearch");
  var searchResults = document.getElementById("searchResults");
  var notesList = document.getElementById("notesList");

  if (!searchInput || !clearBtn || !searchResults || !notesList) {
    return;
  }

  var cards = Array.prototype.slice.call(notesList.querySelectorAll(".exam-course-item"));
  var noteIndex = cards.map(function (card) {
    var titleNode = card.querySelector(".course-title");
    var titleLink = titleNode ? titleNode.querySelector("a") : null;
    var titleText = (titleLink ? titleLink.textContent : titleNode ? titleNode.textContent : "").trim();
    var typeText = (card.querySelector(".course-type") || {}).textContent || "";
    var venueText = (card.querySelector(".course-venue") || {}).textContent || "";

    return {
      card: card,
      titleNode: titleLink || titleNode,
      haystack: [titleText, typeText, venueText].join(" ").toLocaleLowerCase()
    };
  });

  function clearHighlight(node) {
    if (!node) {
      return;
    }
    var marks = node.querySelectorAll("mark.search-mark");
    Array.prototype.forEach.call(marks, function (mark) {
      var text = document.createTextNode(mark.textContent);
      mark.parentNode.replaceChild(text, mark);
    });
    node.normalize();
  }

  function highlightTitle(node, query) {
    if (!node) {
      return;
    }
    clearHighlight(node);
    if (!query) {
      return;
    }

    var text = node.textContent;
    var lowerText = text.toLocaleLowerCase();
    var index = lowerText.indexOf(query);
    if (index < 0) {
      return;
    }

    var before = text.slice(0, index);
    var hit = text.slice(index, index + query.length);
    var after = text.slice(index + query.length);

    while (node.firstChild) {
      node.removeChild(node.firstChild);
    }

    node.appendChild(document.createTextNode(before));
    var mark = document.createElement("mark");
    mark.className = "search-mark";
    mark.textContent = hit;
    node.appendChild(mark);
    node.appendChild(document.createTextNode(after));
  }

  function applySearch(rawInput) {
    var keyword = rawInput.trim();
    var query = keyword.toLocaleLowerCase();
    var visibleCount = 0;

    noteIndex.forEach(function (item) {
      var matched = !query || item.haystack.indexOf(query) !== -1;
      item.card.style.display = matched ? "" : "none";
      if (matched) {
        visibleCount += 1;
      }
      highlightTitle(item.titleNode, matched ? query : "");
    });

    clearBtn.style.display = query ? "inline-flex" : "none";

    if (!query) {
      searchResults.textContent = "支持按课程中文名搜索。";
      searchResults.classList.remove("no-results");
      return;
    }

    if (visibleCount === 0) {
      searchResults.textContent = "未找到包含 \"" + keyword + "\" 的课程。";
      searchResults.classList.add("no-results");
      return;
    }

    searchResults.textContent = "找到 " + visibleCount + " 门课程。";
    searchResults.classList.remove("no-results");
  }

  searchInput.addEventListener("input", function (event) {
    applySearch(event.target.value || "");
  });

  clearBtn.addEventListener("click", function () {
    searchInput.value = "";
    searchInput.focus();
    applySearch("");
  });

  applySearch("");
});
</script>
