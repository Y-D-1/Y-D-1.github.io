---
layout: modern-page
title: "课程笔记"
permalink: /notes/
author_profile: false
---

<p class="notes-page-lead">课程笔记仅供交流学习使用，请勿用于商业用途。</p>

<div class="notes-search">
  <label class="sr-only" for="courseSearch">搜索课程</label>
  <div class="notes-search-row">
    <input type="text" id="courseSearch" placeholder="搜索课程，例如：数学分析、泛函分析" class="search-input">
    <button id="clearSearch" type="button" class="clear-search-btn">清除</button>
  </div>
  <p id="searchResults" class="search-results" aria-live="polite">支持按课程中文名搜索。</p>
</div>

{% include base_path %}

<div class="notes-list" id="notesList">
  {% assign sorted_notes = site.notes | sort: "date" | reverse %}
  {% for post in sorted_notes %}
    {% include archive-single.html %}
  {% endfor %}
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  var searchInput = document.getElementById("courseSearch");
  var clearBtn = document.getElementById("clearSearch");
  var searchResults = document.getElementById("searchResults");
  var notesList = document.getElementById("notesList");
  if (!searchInput || !clearBtn || !searchResults || !notesList) return;

  var cards = Array.prototype.slice.call(notesList.querySelectorAll(".exam-course-item"));
  var noteIndex = cards.map(function (card) {
    var titleNode = card.querySelector(".course-title");
    var titleLink = titleNode ? titleNode.querySelector("a") : null;
    var titleText = (titleLink ? titleLink.textContent : titleNode ? titleNode.textContent : "").trim();
    var typeText = (card.querySelector(".course-type") || {}).textContent || "";
    var venueText = (card.querySelector(".course-venue") || {}).textContent || "";
    return {
      card: card,
      titleNode: titleLink || titleNode,
      haystack: [titleText, typeText, venueText].join(" ").toLocaleLowerCase()
    };
  });

  function clearHighlight(node) {
    if (!node) return;
    node.querySelectorAll("mark.search-mark").forEach(function (mark) {
      mark.parentNode.replaceChild(document.createTextNode(mark.textContent), mark);
    });
    node.normalize();
  }

  function highlightTitle(node, query) {
    if (!node) return;
    clearHighlight(node);
    if (!query) return;
    var text = node.textContent;
    var index = text.toLocaleLowerCase().indexOf(query);
    if (index < 0) return;
    var before = text.slice(0, index);
    var hit = text.slice(index, index + query.length);
    var after = text.slice(index + query.length);
    while (node.firstChild) node.removeChild(node.firstChild);
    node.appendChild(document.createTextNode(before));
    var mark = document.createElement("mark");
    mark.className = "search-mark";
    mark.textContent = hit;
    node.appendChild(mark);
    node.appendChild(document.createTextNode(after));
  }

  function applySearch(rawInput) {
    var keyword = rawInput.trim();
    var query = keyword.toLocaleLowerCase();
    var visibleCount = 0;
    noteIndex.forEach(function (item) {
      var matched = !query || item.haystack.indexOf(query) !== -1;
      item.card.style.display = matched ? "" : "none";
      if (matched) visibleCount += 1;
      highlightTitle(item.titleNode, matched ? query : "");
    });
    clearBtn.style.display = query ? "inline-flex" : "none";
    if (!query) {
      searchResults.textContent = "支持按课程中文名搜索。";
      searchResults.classList.remove("no-results");
      return;
    }
    if (visibleCount === 0) {
      searchResults.textContent = '未找到包含 "' + keyword + '" 的课程。';
      searchResults.classList.add("no-results");
      return;
    }
    searchResults.textContent = "找到 " + visibleCount + " 门课程。";
    searchResults.classList.remove("no-results");
  }

  searchInput.addEventListener("input", function (e) { applySearch(e.target.value || ""); });
  clearBtn.addEventListener("click", function () {
    searchInput.value = "";
    searchInput.focus();
    applySearch("");
  });
  applySearch("");
});
</script>
