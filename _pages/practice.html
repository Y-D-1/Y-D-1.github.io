---
layout: modern-page
title: "随机练习"
permalink: /exams/practice/
author_profile: false
back_url: /exams/
back_label: 返回题库
compact_header: true
---

{% include base_path %}

<div
  id="practiceApp"
  class="practice-app"
  data-api-base="{{ site.data.practice.api_base | default: '' | strip }}"
>
  <div class="practice-toolbar">
    <label class="practice-toolbar__field">
      <span class="sr-only">科目</span>
      <select id="practiceSubject" class="practice-select" disabled>
        <option value="">加载中…</option>
      </select>
    </label>

    <div class="practice-toolbar__actions">
      <button id="practiceNext" type="button" class="btn-primary practice-btn" disabled>
        <i class="ri-shuffle-line" aria-hidden="true"></i> 下一题
      </button>
      <button id="practiceSolution" type="button" class="btn-primary practice-btn practice-btn--secondary" disabled hidden>
        <i class="ri-lightbulb-line" aria-hidden="true"></i> 查看解析
      </button>
    </div>
  </div>

  <p id="practiceStatus" class="practice-status" hidden role="status"></p>

  <section id="practiceQuestionSection" class="practice-block" hidden>
    <h2 class="practice-block__label">题目</h2>
    <div id="practiceQuestion" class="practice-block__body markdown-body" aria-live="polite"></div>
  </section>

  <hr id="practiceDivider" class="practice-divider" hidden>

  <section id="practiceSolutionPanel" class="practice-block practice-block--solution" hidden>
    <h2 class="practice-block__label">解析</h2>
    <div id="practiceSolutionBody" class="practice-block__body markdown-body"></div>
  </section>
</div>

<script src="{{ base_path }}/assets/js/practice.js?v=20260621-7" defer></script>
