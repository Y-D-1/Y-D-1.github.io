<p class="problems-subtitle">来都来了，做几道题再走吧.</p>

<div class="problems-toolbar">
  <label class="problems-label" for="difficultySelect">难度：</label>
  <select id="difficultySelect" class="problems-select">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3" selected>3</option>
    <option value="4">4</option>
    <option value="5">5</option>
  </select>
</div>

<div id="problemCard" class="problem-card" aria-live="polite">
  <p class="problem-empty">正在加载题库...</p>
</div>

<button id="nextProblemBtn" type="button" class="btn problems-refresh">换一道</button>

<style>
.problems-subtitle {
  margin: 0.25rem 0 0;
  font-size: 1.18rem;
  font-weight: 700;
}

.problems-toolbar {
  display: flex;
  align-items: center;
  gap: 0.45rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}

.problems-label {
  font-weight: 600;
}

.problems-select {
  min-width: 86px;
  padding: 0.2rem 0.42rem;
  border: 1px solid var(--global-border-color);
  border-radius: 6px;
  background: var(--global-bg-color);
  color: inherit;
}

.problem-card {
  border: 1px solid rgba(0, 0, 0, 0.12);
  border-radius: 14px;
  padding: 1rem 1rem 0.85rem;
  margin-bottom: 1rem;
  background: var(--global-bg-color);
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
}

.problem-question {
  margin: 0.1rem 0 0.75rem;
  line-height: 1.6;
  font-size: 1.02rem;
}

.problem-special-source {
  margin: 0 0 0.85rem;
  color: var(--global-text-color-light);
  font-size: 0.88rem;
}

.problem-answer {
  margin-top: 0.35rem;
}

.problem-answer summary {
  cursor: pointer;
  font-weight: 600;
}

.problem-answer p {
  margin: 0.5rem 0 0;
  padding-left: 0.1rem;
}

.problem-empty {
  margin: 0;
  color: var(--global-text-color-light);
}

.problems-refresh {
  min-width: 132px;
}

html[data-theme="dark"] .problem-card {
  border-color: rgba(197, 214, 244, 0.24);
  background: rgba(24, 35, 52, 0.9);
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.36);
}

@media (max-width: 768px) {
  .problem-card {
    padding: 0.9rem 0.86rem 0.82rem;
  }
}
</style>

<script>
(function () {
  var bankUrl = "{{ '/Problem/problem-bank.json' | relative_url }}";
  var difficultySelect = document.getElementById("difficultySelect");
  var nextProblemBtn = document.getElementById("nextProblemBtn");
  var problemCard = document.getElementById("problemCard");

  if (!difficultySelect || !nextProblemBtn || !problemCard) {
    return;
  }

  var allProblems = [];
  var currentProblemId = null;

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function formatMathText(value) {
    return escapeHtml(value || "").replace(/\n/g, "<br>");
  }

  function typesetMath(target) {
    if (!window.MathJax) {
      return;
    }

    if (typeof window.MathJax.typesetPromise === "function") {
      window.MathJax.typesetPromise([target]).catch(function () {
        return;
      });
      return;
    }

    if (typeof window.MathJax.typeset === "function") {
      window.MathJax.typeset([target]);
    }
  }

  function getPool() {
    var selectedDifficulty = Number(difficultySelect.value);

    return allProblems.filter(function (item) {
      var diff = Number(item.difficulty);
      return !isNaN(diff) && diff === selectedDifficulty;
    });
  }

  function renderEmpty(message) {
    problemCard.innerHTML = '<p class="problem-empty">' + escapeHtml(message) + '</p>';
  }

  function renderProblem(problem) {
    var sourceLine = problem.special_source
      ? '<p class="problem-special-source">(' + escapeHtml(problem.special_source) + ')</p>'
      : "";
    var answerBlock = problem.answer
      ? '<details class="problem-answer"><summary>参考答案</summary><p>' + formatMathText(problem.answer) + '</p></details>'
      : "";

    problemCard.innerHTML = [
      '<p class="problem-question">' + formatMathText(problem.question || "暂无题面") + '</p>',
      sourceLine,
      answerBlock
    ].join("");

    typesetMath(problemCard);
  }

  function drawProblem() {
    var selectedDifficulty = Number(difficultySelect.value);
    var pool = getPool();

    if (!pool.length) {
      currentProblemId = null;
      renderEmpty("难度 " + selectedDifficulty + " 暂无题目，请先在题库文件中补充题目。");
      return;
    }

    var selected = pool[Math.floor(Math.random() * pool.length)];

    if (pool.length > 1 && currentProblemId) {
      var guard = 0;
      while (selected.id === currentProblemId && guard < 10) {
        selected = pool[Math.floor(Math.random() * pool.length)];
        guard += 1;
      }
    }

    currentProblemId = selected.id || null;
    renderProblem(selected);
  }

  function init() {
    fetch(bankUrl)
      .then(function (response) {
        if (!response.ok) {
          throw new Error("题库加载失败");
        }
        return response.json();
      })
      .then(function (data) {
        if (!data || !Array.isArray(data.problems)) {
          throw new Error("题库格式错误");
        }

        allProblems = data.problems;
        drawProblem();
      })
      .catch(function () {
        renderEmpty("题库读取失败，请检查 Problem/problem-bank.json 文件。");
      });
  }

  difficultySelect.addEventListener("change", drawProblem);
  nextProblemBtn.addEventListener("click", drawProblem);

  init();
})();
</script>
