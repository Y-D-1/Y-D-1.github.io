<p class="problems-subtitle">来都来了，做几道题再走吧.</p>

<div class="problems-zone">
  <div id="bankSelector" class="bank-selector cyber-glass-panel" aria-hidden="false"></div>

  <div id="problemCard" class="problem-card cyber-glass-panel" aria-live="polite">
    <p class="problem-empty">正在加载题库...</p>
  </div>

  <div class="problems-actions">
    <button id="prevProblemBtn" type="button" class="btn" disabled>上一题</button>
    <button id="nextProblemBtn" type="button" class="btn btn-primary problems-refresh">换一道</button>
  </div>
</div>

<style>
/* Fallback when cyber theme CSS not loaded yet */
.problems-zone { margin-top: 0.5rem; }
.problem-card { margin: 1rem 0; padding: 1rem; }
.problems-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
.problem-empty { margin: 0; }
</style>

<script>
(function () {
  var siteBasePath = "{{ '/' | relative_url }}".replace(/\/+$/, "");
  var banksIndexUrl = "{{ '/Problem/banks/index.json' | relative_url }}";
  var fallbackBankUrl = "{{ '/Problem/problem-bank.json' | relative_url }}";
  var nextProblemBtn = document.getElementById("nextProblemBtn");
  var prevProblemBtn = document.getElementById("prevProblemBtn");
  var problemCard = document.getElementById("problemCard");

  if (!nextProblemBtn || !problemCard) {
    return;
  }

  var allProblems = [];
  var currentProblemId = null;
  var problemHistory = [];
  var historyIndex = -1;
  var selectedBankFiles = new Set();
  var bankSelectorEl = document.getElementById('bankSelector');
  var bankNameMap = {
    dg: "微分几何",
    fa: "泛函分析"
  };

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function formatMathText(value) {
    return String(value || "").replace(/\n/g, "<br>");
  }

  function formatQuestionSegment(value) {
    return formatMathText(escapeHtml(value));
  }

  function parseLatexEnumerate(rawText) {
    if (typeof rawText !== "string") {
      return null;
    }

    var beginRegex = /\\begin\{enumerate\}(?:\[[^\]]*\])?/;
    var beginMatch = rawText.match(beginRegex);
    if (!beginMatch || typeof beginMatch.index !== "number") {
      return null;
    }

    var beginIndex = beginMatch.index;
    var beginEnd = beginIndex + beginMatch[0].length;
    var endTag = "\\end{enumerate}";
    var endIndex = rawText.indexOf(endTag, beginEnd);
    if (endIndex === -1) {
      return null;
    }

    var stem = rawText.slice(0, beginIndex).trim();
    var body = rawText.slice(beginEnd, endIndex);
    var tail = rawText.slice(endIndex + endTag.length).trim();

    var itemRegex = /\\item(?:\[[^\]]*\])?\s*/g;
    var markers = [];
    var match;

    while ((match = itemRegex.exec(body)) !== null) {
      markers.push({
        start: match.index,
        end: itemRegex.lastIndex
      });
    }

    if (!markers.length) {
      return null;
    }

    var items = [];
    for (var i = 0; i < markers.length; i += 1) {
      var itemStart = markers[i].end;
      var itemEnd = i + 1 < markers.length ? markers[i + 1].start : body.length;
      var itemText = body.slice(itemStart, itemEnd).trim();
      if (itemText) {
        items.push(itemText);
      }
    }

    if (!items.length) {
      return null;
    }

    return {
      stem: stem,
      items: items,
      tail: tail
    };
  }

  function getStructuredQuestion(problem) {
    if (!problem || typeof problem !== "object") {
      return null;
    }

    var groups = [problem.subquestions, problem.parts, problem.questions];
    for (var i = 0; i < groups.length; i += 1) {
      var list = groups[i];
      if (!Array.isArray(list) || !list.length) {
        continue;
      }

      var cleaned = list
        .map(function (entry) {
          return String(entry || "").trim();
        })
        .filter(function (entry) {
          return !!entry;
        });

      if (!cleaned.length) {
        continue;
      }

      return {
        stem: String(problem.question || "").trim(),
        items: cleaned,
        tail: ""
      };
    }

    return parseLatexEnumerate(String(problem.question || ""));
  }

  function renderQuestionContent(problem) {
    var structured = getStructuredQuestion(problem);

    if (!structured) {
      return '<p class="problem-question">' + formatQuestionSegment(problem.question || "暂无题面") + '</p>';
    }

    var html = [];

    if (structured.stem) {
      html.push('<p class="problem-question problem-question-stem">' + formatQuestionSegment(structured.stem) + '</p>');
    }

    html.push('<ol class="problem-subquestions">');
    structured.items.forEach(function (item) {
      html.push('<li class="problem-subquestion">' + formatQuestionSegment(item) + '</li>');
    });
    html.push('</ol>');

    if (structured.tail) {
      html.push('<p class="problem-question problem-question-tail">' + formatQuestionSegment(structured.tail) + '</p>');
    }

    return html.join("");
  }

  function hasRenderableQuestion(item) {
    if (!item || typeof item !== "object") {
      return false;
    }

    if (typeof item.question === "string" && item.question.trim()) {
      return true;
    }

    var groups = [item.subquestions, item.parts, item.questions];
    for (var i = 0; i < groups.length; i += 1) {
      var list = groups[i];
      if (Array.isArray(list) && list.some(function (entry) {
        return String(entry || "").trim().length > 0;
      })) {
        return true;
      }
    }

    return false;
  }

  var mathRetryTimer = null;

  function typesetMath(target) {
    if (!window.MathJax || !target) {
      if (mathRetryTimer) {
        return;
      }

      mathRetryTimer = setTimeout(function () {
        mathRetryTimer = null;
        typesetMath(target);
      }, 120);
      return;
    }

    if (mathRetryTimer) {
      clearTimeout(mathRetryTimer);
      mathRetryTimer = null;
    }

    if (typeof window.MathJax.typesetClear === "function") {
      window.MathJax.typesetClear([target]);
    }

    if (typeof window.MathJax.typesetPromise === "function") {
      window.MathJax.typesetPromise([target]).catch(function () {
        setTimeout(function () {
          if (window.MathJax && typeof window.MathJax.typesetPromise === "function") {
            window.MathJax.typesetPromise([target]).catch(function () {
              return;
            });
          }
        }, 120);
      });
      return;
    }

    if (typeof window.MathJax.typeset === "function") {
      window.MathJax.typeset([target]);
    }
  }

  function renderEmpty(message) {
    problemCard.innerHTML = '<p class="problem-empty">' + escapeHtml(message) + '</p>';
  }

  function toSiteUrl(path) {
    var value = String(path || "").trim();
    if (!value) {
      return "";
    }

    if (/^https?:\/\//i.test(value)) {
      return value;
    }

    if (siteBasePath && (value === siteBasePath || value.indexOf(siteBasePath + "/") === 0)) {
      return value;
    }

    if (value.charAt(0) === "/") {
      return siteBasePath + value;
    }

    return (siteBasePath ? siteBasePath : "") + "/" + value.replace(/^\.\//, "");
  }

  function fetchJsonWithTimeout(url, timeoutMs) {
    return new Promise(function (resolve) {
      var done = false;

      function settle(result) {
        if (done) {
          return;
        }
        done = true;
        resolve(result);
      }

      var timer = setTimeout(function () {
        settle(null);
      }, timeoutMs);

      fetch(url)
        .then(function (response) {
          if (!response.ok) {
            return null;
          }
          return response.json().catch(function () {
            return null;
          });
        })
        .catch(function () {
          return null;
        })
        .then(function (data) {
          clearTimeout(timer);
          settle(data);
        });
    });
  }

  function getBankDisplayName(bank) {
    if (!bank || typeof bank !== "object") {
      return "未知题库";
    }

    var id = String(bank.id || "").trim();
    if (id && bankNameMap[id]) {
      return bankNameMap[id];
    }

    var customName = String(bank.name || "").trim();
    if (customName) {
      return customName;
    }

    return id || "题库";
  }

  function renderProblem(problem) {
    var diff = Number(problem.difficulty);
    var diffLabel = !isNaN(diff) ? String(diff) : "未标注";
    var pid = problem.id ? String(problem.id) : "";

    problemCard.innerHTML = [
      '<div class="problem-header">',
      pid ? '<span class="problem-id">' + escapeHtml(pid) + '</span>' : '<span></span>',
      '<span class="problem-difficulty">难度 ' + escapeHtml(diffLabel) + '</span>',
      '</div>',
      renderQuestionContent(problem)
    ].join("");

    typesetMath(problemCard);
    updateNavButtons();
  }

  function updateNavButtons() {
    if (prevProblemBtn) {
      prevProblemBtn.disabled = historyIndex <= 0;
    }
  }

  function rememberProblem(problem) {
    if (!problem) {
      return;
    }

    if (historyIndex < problemHistory.length - 1) {
      problemHistory = problemHistory.slice(0, historyIndex + 1);
    }

    var last = problemHistory[problemHistory.length - 1];
    if (last && last.id && problem.id && last.id === problem.id) {
      historyIndex = problemHistory.length - 1;
      updateNavButtons();
      return;
    }

    problemHistory.push(problem);
    historyIndex = problemHistory.length - 1;
    updateNavButtons();
  }

  function showPreviousProblem() {
    if (historyIndex <= 0) {
      return;
    }

    historyIndex -= 1;
    var previous = problemHistory[historyIndex];
    currentProblemId = previous.id || null;
    renderProblem(previous);
  }

  function drawProblem() {
    var pool = allProblems.filter(function (item) {
      return hasRenderableQuestion(item);
    });

    if (!pool.length) {
      currentProblemId = null;
      renderEmpty("题库暂无题目，请先在题库文件中补充题目。");
      return;
    }

    var selected = pool[Math.floor(Math.random() * pool.length)];

    if (pool.length > 1 && currentProblemId) {
      var guard = 0;
      while (selected.id === currentProblemId && guard < 10) {
        selected = pool[Math.floor(Math.random() * pool.length)];
        guard += 1;
      }
    }

    currentProblemId = selected.id || null;
    rememberProblem(selected);
    renderProblem(selected);
  }

  function loadSelectedBanks() {
    var files = Array.from(selectedBankFiles);
    if (!files.length) {
      allProblems = [];
      renderEmpty("请至少选择一个题库");
      return;
    }

    Promise.all(files.map(function (file) {
      return fetchJsonWithTimeout(file, 8000);
    }))
      .then(function (datasets) {
        allProblems = [];
        datasets.forEach(function (d) {
          if (d && Array.isArray(d.problems)) {
            allProblems = allProblems.concat(d.problems);
          }
        });

        if (!allProblems.length) {
          renderEmpty("题库读取失败或超时，请刷新后重试。");
          return;
        }

        drawProblem();
      });
  }

  function init() {
    /* 尝试加载 banks index（如果不存在则回退到 legacy 单文件） */
    fetch(banksIndexUrl)
      .then(function (r) {
        if (!r.ok) throw new Error('no-index');
        return r.json();
      })
      .then(function (idx) {
        var banks = (idx && Array.isArray(idx.banks)) ? idx.banks : [];
        bankSelectorEl = bankSelectorEl || document.getElementById('bankSelector');
        if (!bankSelectorEl) {
          bankSelectorEl = document.createElement('div');
          bankSelectorEl.id = 'bankSelector';
          bankSelectorEl.className = 'bank-selector';
          problemCard.parentNode.insertBefore(bankSelectorEl, problemCard);
        }

        if (!banks.length) {
          selectedBankFiles.add(fallbackBankUrl);
          loadSelectedBanks();
          return;
        }

        banks.forEach(function (b) {
          var file = toSiteUrl(b.file || b.path);
          if (!file) return;
          var label = document.createElement('label');
          label.className = 'bank-item';
          var input = document.createElement('input');
          input.type = 'checkbox';
          input.checked = true;
          input.dataset.file = file;
          input.addEventListener('change', function () {
            if (this.checked) selectedBankFiles.add(this.dataset.file);
            else selectedBankFiles.delete(this.dataset.file);
            loadSelectedBanks();
          });
          label.appendChild(input);
          label.appendChild(document.createTextNode(' ' + getBankDisplayName(b) + (b.count ? ' (' + b.count + ')' : '')));
          bankSelectorEl.appendChild(label);
          selectedBankFiles.add(file);
        });

        loadSelectedBanks();
      })
      .catch(function () {
        /* 回退：使用单一题库文件 */
        selectedBankFiles.add(toSiteUrl(fallbackBankUrl));
        loadSelectedBanks();
      });
  }

  nextProblemBtn.addEventListener("click", drawProblem);
  if (prevProblemBtn) {
    prevProblemBtn.addEventListener("click", showPreviousProblem);
  }

  init();
})();
</script>
